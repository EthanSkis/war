<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>ETHGRD Arena - FPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }
        #game-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 24px; height: 24px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::before {
            width: 2px; height: 24px;
            left: 11px; top: 0;
        }
        #crosshair::after {
            width: 24px; height: 2px;
            top: 11px; left: 0;
        }
        #crosshair .dot {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255,50,50,0.9);
            border-radius: 50%;
            top: 10px; left: 10px;
        }

        #health-bar {
            position: absolute;
            bottom: 30px; left: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #health-bar .bar-container {
            width: 200px; height: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }
        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666);
            transition: width 0.2s;
            width: 100%;
        }
        #health-text {
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            min-width: 40px;
        }
        #health-icon {
            font-size: 22px;
        }

        #armor-bar {
            position: absolute;
            bottom: 60px; left: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #armor-bar .bar-container {
            width: 200px; height: 14px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        #armor-fill {
            height: 100%;
            background: linear-gradient(90deg, #3388ff, #66aaff);
            transition: width 0.2s;
            width: 0%;
        }
        #armor-text {
            font-size: 14px;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            min-width: 40px;
        }

        #spawn-protection {
            position: absolute;
            bottom: 90px; left: 30px;
            font-size: 14px;
            font-weight: bold;
            color: #44ddff;
            text-shadow: 0 0 10px rgba(68,200,255,0.7), 0 0 20px rgba(68,170,255,0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #ammo-display {
            position: absolute;
            bottom: 30px; right: 30px;
            text-align: right;
        }
        #ammo-current {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 6px rgba(0,0,0,0.8);
            line-height: 1;
        }
        #ammo-reserve {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        #weapon-name {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        #killfeed {
            position: absolute;
            top: 10px; right: 10px;
            text-align: right;
            font-size: 13px;
        }
        .kill-entry {
            padding: 3px 8px;
            margin-bottom: 2px;
            background: rgba(0,0,0,0.4);
            border-radius: 3px;
            animation: fadeIn 0.3s ease;
            white-space: nowrap;
        }
        .kill-entry .killer { color: #ff9944; }
        .kill-entry .victim { color: #ff4444; }
        .kill-entry .weapon-icon { color: #aaa; margin: 0 6px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        #scoreboard {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 20px;
            min-width: 500px;
            display: none;
            pointer-events: auto;
        }
        #scoreboard h2 {
            text-align: center;
            margin-bottom: 12px;
            font-size: 20px;
            color: #ff9944;
        }
        #scoreboard table {
            width: 100%;
            border-collapse: collapse;
        }
        #scoreboard th {
            text-align: left;
            padding: 6px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-transform: uppercase;
        }
        #scoreboard td {
            padding: 4px 12px;
            font-size: 14px;
        }
        #scoreboard tr.player-row { background: rgba(255,153,68,0.1); }

        #match-timer {
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 6px rgba(0,0,0,0.8);
        }

        #damage-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 9;
            border: 0px solid rgba(255,0,0,0);
            transition: border 0.1s;
        }

        #hit-marker {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            opacity: 0;
            transition: opacity 0.05s;
        }
        #hit-marker .hm-line {
            position: absolute;
            background: #fff;
            width: 8px; height: 2px;
        }
        #hit-marker .hm-line:nth-child(1) { top: 2px; left: 12px; transform: rotate(45deg); }
        #hit-marker .hm-line:nth-child(2) { top: 2px; right: 12px; transform: rotate(-45deg); }
        #hit-marker .hm-line:nth-child(3) { bottom: 2px; left: 12px; transform: rotate(-45deg); }
        #hit-marker .hm-line:nth-child(4) { bottom: 2px; right: 12px; transform: rotate(45deg); }

        /* Menu */
        #menu-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #menu-screen h1 {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ff6600, #ff3300, #ff0066);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        #menu-screen .subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 12px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }
        .menu-btn {
            display: block;
            width: 280px;
            padding: 14px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .menu-btn:hover {
            background: rgba(255,102,0,0.2);
            border-color: rgba(255,102,0,0.6);
            transform: translateY(-1px);
        }

        .settings-group {
            margin: 20px 0;
            text-align: center;
        }
        .settings-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .settings-group select {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        /* Respawn overlay */
        #respawn-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(139,0,0,0.4);
            z-index: 15;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #respawn-overlay h2 {
            font-size: 48px;
            color: #ff3333;
            margin-bottom: 10px;
        }
        #respawn-timer {
            font-size: 24px;
            color: rgba(255,255,255,0.7);
        }
        #killed-by {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }

        /* Minimap */
        #minimap {
            position: absolute;
            top: 50px; left: 10px;
            width: 150px; height: 150px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        #minimap canvas {
            width: 100%; height: 100%;
        }

        /* Weapon switch indicator */
        #weapon-slots {
            position: absolute;
            bottom: 90px; right: 30px;
            display: flex;
            gap: 4px;
        }
        .weapon-slot {
            padding: 4px 10px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 3px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        .weapon-slot.active {
            border-color: rgba(255,153,68,0.8);
            color: #ff9944;
            background: rgba(255,153,68,0.1);
        }

        /* ===== TOUCH CONTROLS ===== */
        #touch-controls {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 20;
            pointer-events: none;
            touch-action: none;
        }

        .touch-joystick-base {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            touch-action: none;
        }
        .touch-joystick-knob {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            border: 2px solid rgba(255,255,255,0.4);
        }

        .touch-btn {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: auto;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.1s, transform 0.1s;
        }
        .touch-btn.pressed {
            transform: scale(0.9);
        }

        .touch-btn-fire {
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            background: rgba(255,50,50,0.25);
            border: 2px solid rgba(255,50,50,0.5);
            font-size: 13px;
        }
        .touch-btn-fire.pressed {
            background: rgba(255,50,50,0.5);
        }

        .touch-btn-jump {
            bottom: 130px;
            right: 35px;
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .touch-btn-jump.pressed {
            background: rgba(255,255,255,0.2);
        }

        .touch-btn-reload {
            bottom: 130px;
            right: 110px;
            width: 48px;
            height: 48px;
            background: rgba(255,170,50,0.15);
            border: 2px solid rgba(255,170,50,0.35);
        }
        .touch-btn-reload.pressed {
            background: rgba(255,170,50,0.35);
        }

        .touch-btn-crouch {
            bottom: 30px;
            right: 130px;
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .touch-btn-crouch.pressed {
            background: rgba(255,255,255,0.2);
        }

        .touch-btn-weapon {
            bottom: 200px;
            right: 35px;
            width: 48px;
            height: 48px;
            background: rgba(100,150,255,0.15);
            border: 2px solid rgba(100,150,255,0.35);
        }
        .touch-btn-weapon.pressed {
            background: rgba(100,150,255,0.35);
        }

        .touch-btn-score {
            top: 10px;
            right: 10px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            font-size: 10px;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 900px), (max-height: 500px) {
            #menu-screen h1 {
                font-size: 40px;
                letter-spacing: 4px;
            }
            #menu-screen .subtitle {
                font-size: 11px;
                letter-spacing: 6px;
                margin-bottom: 20px;
            }
            .settings-group {
                margin: 8px 0;
            }
            .settings-group label {
                font-size: 11px;
                margin-bottom: 4px;
            }
            .settings-group select {
                padding: 6px 12px;
                font-size: 13px;
            }
            .menu-btn {
                width: 220px;
                padding: 10px;
                font-size: 14px;
                margin: 5px 0;
            }

            #health-bar {
                bottom: 10px; left: 10px;
            }
            #health-bar .bar-container {
                width: 100px; height: 14px;
            }
            #health-text { font-size: 13px; }
            #health-icon { font-size: 16px; }

            #armor-bar {
                bottom: 30px; left: 10px;
            }
            #armor-bar .bar-container {
                width: 100px; height: 10px;
            }
            #armor-text { font-size: 11px; }

            #ammo-display {
                bottom: auto; right: auto;
                top: 10px; left: 50%;
                transform: translateX(-50%);
                text-align: center;
                display: flex;
                align-items: baseline;
                gap: 6px;
            }
            #ammo-current { font-size: 24px; }
            #ammo-reserve { font-size: 13px; }
            #weapon-name { font-size: 11px; margin-top: 0; margin-left: 6px; }

            #match-timer {
                top: 6px;
                font-size: 15px;
            }

            #killfeed {
                top: 35px; right: 5px;
                font-size: 10px;
            }
            .kill-entry { padding: 2px 5px; }

            #minimap {
                top: 35px; left: 5px;
                width: 80px; height: 80px;
            }

            #weapon-slots {
                display: none;
            }

            #scoreboard {
                min-width: 0;
                width: 90vw;
                max-width: 400px;
                padding: 12px;
            }
            #scoreboard h2 { font-size: 16px; margin-bottom: 8px; }
            #scoreboard th { font-size: 10px; padding: 3px 6px; }
            #scoreboard td { font-size: 12px; padding: 3px 6px; }

            #respawn-overlay h2 { font-size: 32px; }
            #respawn-timer { font-size: 18px; }
            #killed-by { font-size: 14px; }
        }

        /* Very small phones in portrait */
        @media (max-width: 480px) and (orientation: portrait) {
            #menu-screen h1 { font-size: 32px; }
            #menu-screen .subtitle { font-size: 9px; letter-spacing: 4px; margin-bottom: 12px; }
            .settings-group { margin: 5px 0; }
            .menu-btn { width: 180px; padding: 8px; font-size: 12px; }

            .touch-joystick-base {
                width: 100px; height: 100px;
                bottom: 20px; left: 15px;
            }
            .touch-joystick-knob {
                width: 42px; height: 42px;
            }
            .touch-btn-fire {
                width: 65px; height: 65px;
                bottom: 20px; right: 15px;
            }
            .touch-btn-jump {
                bottom: 100px; right: 20px;
                width: 46px; height: 46px;
            }
            .touch-btn-reload {
                bottom: 100px; right: 80px;
                width: 40px; height: 40px;
                font-size: 10px;
            }
            .touch-btn-crouch {
                bottom: 20px; right: 100px;
                width: 40px; height: 40px;
                font-size: 10px;
            }
            .touch-btn-weapon {
                bottom: 160px; right: 20px;
                width: 40px; height: 40px;
                font-size: 10px;
            }
        }

        /* Landscape phone optimization */
        @media (max-height: 450px) and (orientation: landscape) {
            #menu-screen {
                flex-direction: column;
                overflow-y: auto;
                padding: 10px 0;
                justify-content: flex-start;
            }
            #menu-screen h1 { font-size: 30px; margin-top: 10px; }
            #menu-screen .subtitle { margin-bottom: 10px; font-size: 10px; }
            .settings-group { margin: 4px 0; }
            .settings-group label { font-size: 10px; margin-bottom: 2px; }

            #ammo-display {
                top: 4px;
            }
            #match-timer { top: 4px; font-size: 13px; }
            #minimap { top: 25px; left: 3px; width: 65px; height: 65px; }
            #health-bar { bottom: 6px; left: 6px; }
            #armor-bar { bottom: 24px; left: 6px; }

            .touch-joystick-base {
                bottom: 10px; left: 15px;
                width: 90px; height: 90px;
            }
            .touch-joystick-knob { width: 38px; height: 38px; }
            .touch-btn-fire { bottom: 10px; right: 15px; width: 65px; height: 65px; }
            .touch-btn-jump { bottom: 85px; right: 20px; width: 46px; height: 46px; }
            .touch-btn-reload { bottom: 85px; right: 80px; width: 40px; height: 40px; font-size: 10px; }
            .touch-btn-crouch { bottom: 10px; right: 95px; width: 40px; height: 40px; font-size: 10px; }
            .touch-btn-weapon { bottom: 140px; right: 20px; width: 40px; height: 40px; font-size: 10px; }
        }

        /* Safe area insets for notched phones */
        @supports (padding: env(safe-area-inset-left)) {
            .touch-joystick-base {
                left: calc(30px + env(safe-area-inset-left));
            }
            .touch-btn-fire {
                right: calc(30px + env(safe-area-inset-right));
            }
            .touch-btn-jump {
                right: calc(35px + env(safe-area-inset-right));
            }
            .touch-btn-weapon {
                right: calc(35px + env(safe-area-inset-right));
            }
            #health-bar {
                left: calc(10px + env(safe-area-inset-left));
            }
            #armor-bar {
                left: calc(10px + env(safe-area-inset-left));
            }
        }

        /* Prevent text selection and callouts on mobile */
        body.mobile-active {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
            overscroll-behavior: none;
        }
    </style>
</head>
<body>
    <!-- Menu Screen -->
    <div id="menu-screen">
        <h1>ETHGRD</h1>
        <div class="subtitle">Arena Combat</div>

        <div class="settings-group">
            <label>Game Mode</label>
            <select id="game-mode">
                <option value="ffa">Free For All</option>
                <option value="tdm">Team Deathmatch</option>
            </select>
        </div>

        <div class="settings-group">
            <label>Bot Difficulty</label>
            <select id="bot-difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div class="settings-group">
            <label>Bot Count</label>
            <select id="bot-count">
                <option value="4">4 Bots</option>
                <option value="8" selected>8 Bots</option>
                <option value="12">12 Bots</option>
            </select>
        </div>

        <div class="settings-group">
            <label>Map</label>
            <select id="map-select">
                <option value="warehouse">Warehouse (Close Quarters)</option>
                <option value="canyon">Canyon (Open)</option>
                <option value="facility">Facility (Mixed)</option>
            </select>
        </div>

        <button class="menu-btn" id="btn-play">Start Match</button>
        <button class="menu-btn" id="btn-controls">Controls</button>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div id="crosshair"><div class="dot"></div></div>

        <div id="match-timer">5:00</div>

        <div id="health-bar">
            <span id="health-icon">+</span>
            <div class="bar-container"><div id="health-fill"></div></div>
            <span id="health-text">100</span>
        </div>

        <div id="armor-bar">
            <span style="font-size:16px; color:#3388ff;">&#9632;</span>
            <div class="bar-container"><div id="armor-fill"></div></div>
            <span id="armor-text">0</span>
        </div>

        <div id="spawn-protection"></div>

        <div id="ammo-display">
            <div id="ammo-current">30</div>
            <div id="ammo-reserve">/ 90</div>
            <div id="weapon-name">RIFLE</div>
        </div>

        <div id="weapon-slots"></div>

        <div id="killfeed"></div>

        <div id="minimap"><canvas id="minimap-canvas" width="150" height="150"></canvas></div>

        <div id="hit-marker">
            <div class="hm-line"></div>
            <div class="hm-line"></div>
            <div class="hm-line"></div>
            <div class="hm-line"></div>
        </div>

        <div id="scoreboard">
            <h2>SCOREBOARD</h2>
            <table>
                <thead><tr><th>Player</th><th>K</th><th>D</th><th>Score</th></tr></thead>
                <tbody id="scoreboard-body"></tbody>
            </table>
        </div>
    </div>
